services:
  postgres:
    image: postgres:16-alpine
    container_name: stack62-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-stack62}
    ports:
      - '5432:5432'
    volumes:
      - stack62_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stack62-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - stack62_redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stack62-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    command: ["node", "dist/main.js"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stack62-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    command: ["node", "dist/worker.js"]

volumes:
  stack62_pg_data:
  stack62_redis_data: