name: Feature Request
description: Propose a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the user pain or gap.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should it work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI Engine / Coworker
        - System Builder
        - Records / Workflows
        - Documents
        - Billing
        - Auth / Permissions
        - Integrations
        - Meeting Bot
        - Frontend UI
        - API / Developer Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What else did you think about?
