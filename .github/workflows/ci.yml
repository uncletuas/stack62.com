name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: npm run build

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Stack62_design/package-lock.json
      - working-directory: Stack62_design
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: Stack62_design
        run: npx tsc --noEmit
      - name: Build
        working-directory: Stack62_design
        run: npx vite build
