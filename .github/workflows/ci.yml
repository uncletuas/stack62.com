name: ci

on:
  push:
    branches: [main, author]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint:check

  backend-typecheck:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json
      - name: Build
        run: npm run build

  backend-test:
    name: Backend (unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Unit tests
        run: npm run test:cov
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage/
          retention-days: 7

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Stack62_design/package-lock.json
      - working-directory: Stack62_design
        run: npm ci --no-audit --no-fund
      - name: Type-check
        working-directory: Stack62_design
        run: npx tsc --noEmit
      - name: Build
        working-directory: Stack62_design
        run: npx vite build
